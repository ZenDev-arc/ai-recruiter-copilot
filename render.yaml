services:
  - type: web
    name: ai-recruiter-copilot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "frontend.app:app" --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: GOOGLE_TOKEN_B64
        sync: false
      - key: PYTHON_ENV
        value: production
